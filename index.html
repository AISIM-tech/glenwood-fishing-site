<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Glenwood Fishing Conditions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <main>
      <section class="map-prototype">
        <div class="map-panel">
          <div class="map-panel__header">
            <div>
              <p class="panel-label">Glenwood Springs Fly Map</p>
              <h1>Tap a point. Read the water.</h1>
            </div>
          </div>

          <div class="map-layout">
            <div class="map-stage">
              <div class="map-canvas" id="map-canvas" aria-label="Prototype fishing access map"></div>
              <aside class="map-locator" aria-label="Regional locator inset">
                <p class="panel-label">Area of interest</p>
                <div class="map-locator__frame">
                  <svg class="map-locator__svg" viewBox="0 0 180 190" role="img" aria-label="Colorado locator map with the Roaring Fork valley highlighted">
                    <path class="map-locator__state" d="M34 22 L146 22 L146 144 L124 144 L124 168 L80 168 L80 184 L34 184 Z"></path>
                    <circle class="map-locator__focus" cx="79" cy="92" r="11"></circle>
                    <circle class="map-locator__focus-dot" cx="79" cy="92" r="3.5"></circle>
                    <text class="map-locator__label map-locator__label--state" x="90" y="16">Colorado</text>
                  </svg>
                </div>
              </aside>
              <aside class="map-detail" id="map-detail">
                <div class="map-detail__topbar">
                  <div>
                    <p class="panel-label">Selected Truth Source</p>
                    <h3 id="map-detail-name">Choose a point</h3>
                    <p class="map-detail__sub" id="map-detail-river">Tap a marker to inspect local conditions.</p>
                  </div>
                  <button class="map-detail__close" id="map-detail-close" type="button" aria-label="Close point details">Close</button>
                </div>

                <div class="map-detail__score">
                  <span>Fishability score</span>
                  <div class="meter-track">
                    <div class="meter-fill" id="map-detail-meter"></div>
                  </div>
                  <strong id="map-detail-score">0 / 100</strong>
                </div>

                <section class="camera-strip map-detail__section" id="camera-card">
                  <div class="camera-strip__media" id="camera-media"></div>
                </section>

                <div class="map-detail__metrics" id="map-detail-metrics"></div>
                <div class="map-detail__chips" id="map-detail-chips"></div>
                <div id="map-detail-summary"></div>

                <details class="context-drawer map-detail__section">
                  <summary>More context</summary>
                  <section class="weather-strip" id="weather-card">
                    <div class="weather-strip__intro">
                      <p class="panel-label">General Weather</p>
                      <h4 id="weather-title">Today around the valley</h4>
                    </div>
                    <div class="weather-strip__metrics" id="weather-metrics"></div>
                  </section>

                  <section class="moon-strip" id="moon-card">
                    <div class="moon-strip__content" id="weather-moon">Moon</div>
                    <div class="moon-strip__summary" id="weather-summary">Moon context will show here.</div>
                  </section>
                </details>
              </aside>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
